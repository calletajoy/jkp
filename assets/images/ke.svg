<?xml version="1.0"?>
<!--======== Jumuiya ya Kaunti za Pwani - Coastal Counties Map ========-->
<!-- Six Coastal Counties Only: Mombasa, Kwale, Kilifi, Tana River, Lamu, Taita Taveta -->

<svg baseprofile="tiny" height="800" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round" stroke-width="1" version="1.2" viewbox="400 500 500 500" width="800" xmlns="http://www.w3.org/2000/svg">

 <!-- ===== STYLES ===== -->
 <style type="text/css">
  <![CDATA[
    /* County colors */
    .mombasa { fill: #3498DB; }      /* Sky Blue */
    .kwale { fill: #9B59B6; }         /* Purple */
    .kilifi { fill: #2ECC71; }         /* Green */
    .tana-river { fill: #F39C12; }     /* Orange */
    .lamu { fill: #F1C40F; }           /* Yellow */
    .taita-taveta { fill: #E67E22; }   /* Coral Red */
    
    /* Base styles */
    .county {
        stroke: #FFFFFF;
        stroke-width: 2;
        transition: all 0.3s ease;
        cursor: pointer;
        filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
    }
    
    /* Hover effects */
    .county:hover {
        filter: brightness(1.1) drop-shadow(0 8px 12px rgba(0,0,0,0.2));
        stroke-width: 3;
        stroke: #273C67;
        transform: translateY(-2px);
    }
    
    /* Location markers */
    .marker {
        fill: white;
        stroke: #273C67;
        stroke-width: 3;
        cursor: pointer;
        animation: pulse 2s ease-in-out infinite;
        filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        r: 10;
    }
    
    /* Different pulse delays */
    .marker-1 { animation-delay: 0s; }
    .marker-2 { animation-delay: 0.3s; }
    .marker-3 { animation-delay: 0.6s; }
    .marker-4 { animation-delay: 0.9s; }
    .marker-5 { animation-delay: 1.2s; }
    .marker-6 { animation-delay: 1.5s; }
    
    @keyframes pulse {
        0% { r: 10; opacity: 1; stroke-width: 3; }
        50% { r: 18; opacity: 0.9; stroke-width: 2; fill: #00CED1; }
        100% { r: 10; opacity: 1; stroke-width: 3; }
    }
    
    /* County names */
    .county-name {
        font-family: 'Montserrat', sans-serif;
        font-size: 14px;
        font-weight: bold;
        fill: #273C67;
        pointer-events: none;
        text-anchor: middle;
        text-shadow: 0 2px 4px rgba(255,255,255,0.8);
    }
    
    /* Capital markers - smaller, non-pulsing */
    .capital-dot {
        fill: #273C67;
        r: 4;
    }
  ]]>
 </style>

 <!-- ===== COASTAL COUNTIES ===== -->
 <g id="coastal-counties">
  
  <!-- MOMBASA COUNTY - Sky Blue -->
  <path class="county mombasa" d="M580,780 L620,790 L630,820 L610,840 L580,835 L560,810 L570,790 L580,780 Z" data-name="Mombasa" data-capital="Mombasa City"/>
  
  <!-- KWALE COUNTY - Purple -->
  <path class="county kwale" d="M560,810 L580,835 L570,860 L540,870 L520,850 L530,820 L550,815 L560,810 Z" data-name="Kwale" data-capital="Kwale Town"/>
  
  <!-- KILIFI COUNTY - Green -->
  <path class="county kilifi" d="M620,690 L650,700 L670,730 L660,770 L630,780 L600,770 L590,740 L600,710 L620,690 Z" data-name="Kilifi" data-capital="Kilifi Town"/>
  
  <!-- TANA RIVER COUNTY - Orange -->
  <path class="county tana-river" d="M640,610 L680,620 L700,650 L690,690 L660,700 L630,690 L620,660 L630,630 L640,610 Z" data-name="Tana River" data-capital="Hola"/>
  
  <!-- LAMU COUNTY - Yellow -->
  <path class="county lamu" d="M710,640 L750,650 L770,680 L760,720 L720,730 L690,710 L680,680 L690,650 L710,640 Z" data-name="Lamu" data-capital="Lamu Town"/>
  
  <!-- TAITA TAVETA COUNTY - Coral Red -->
  <path class="county taita-taveta" d="M540,760 L570,750 L590,770 L580,800 L550,810 L520,790 L510,760 L530,750 L540,760 Z" data-name="Taita Taveta" data-capital="Voi"/>
  
 </g>

 <!-- ===== PULSATING LOCATION MARKERS ===== -->
 <g id="markers">
  <!-- Mombasa Marker -->
  <circle class="marker marker-1" cx="595" cy="805" r="10" fill="#FFFFFF" stroke="#273C67" stroke-width="3" data-name="Mombasa" data-capital="Mombasa City"/>
  
  <!-- Kwale Marker -->
  <circle class="marker marker-2" cx="545" cy="840" r="10" fill="#FFFFFF" stroke="#273C67" stroke-width="3" data-name="Kwale" data-capital="Kwale Town"/>
  
  <!-- Kilifi Marker -->
  <circle class="marker marker-3" cx="630" cy="735" r="10" fill="#FFFFFF" stroke="#273C67" stroke-width="3" data-name="Kilifi" data-capital="Kilifi Town"/>
  
  <!-- Tana River Marker -->
  <circle class="marker marker-4" cx="660" cy="655" r="10" fill="#FFFFFF" stroke="#273C67" stroke-width="3" data-name="Tana River" data-capital="Hola"/>
  
  <!-- Lamu Marker -->
  <circle class="marker marker-5" cx="720" cy="685" r="10" fill="#FFFFFF" stroke="#273C67" stroke-width="3" data-name="Lamu" data-capital="Lamu Town"/>
  
  <!-- Taita Taveta Marker -->
  <circle class="marker marker-6" cx="550" cy="775" r="10" fill="#FFFFFF" stroke="#273C67" stroke-width="3" data-name="Taita Taveta" data-capital="Voi"/>
 </g>

 <!-- ===== CAPITAL CITY MARKERS (small dots) ===== -->
 <g id="capitals">
  <circle cx="595" cy="805" r="4" fill="#273C67" class="capital-dot"/>
  <circle cx="545" cy="840" r="4" fill="#273C67" class="capital-dot"/>
  <circle cx="630" cy="735" r="4" fill="#273C67" class="capital-dot"/>
  <circle cx="660" cy="655" r="4" fill="#273C67" class="capital-dot"/>
  <circle cx="720" cy="685" r="4" fill="#273C67" class="capital-dot"/>
  <circle cx="550" cy="775" r="4" fill="#273C67" class="capital-dot"/>
 </g>

 <!-- ===== COUNTY LABELS ===== -->
 <g id="labels">
  <text x="595" y="780" class="county-name">MOMBASA</text>
  <text x="545" y="865" class="county-name">KWALE</text>
  <text x="630" y="710" class="county-name">KILIFI</text>
  <text x="660" y="630" class="county-name">TANA RIVER</text>
  <text x="720" y="660" class="county-name">LAMU</text>
  <text x="550" y="750" class="county-name">TAITA TAVETA</text>
 </g>

 <!-- ===== SIMPLE COASTLINE (optional decorative element) ===== -->
 <path d="M500,900 Q600,880 700,860" stroke="#00CED1" stroke-width="3" fill="none" stroke-dasharray="5,5" opacity="0.5"/>
 <path d="M480,870 Q580,850 680,830" stroke="#00CED1" stroke-width="2" fill="none" stroke-dasharray="3,3" opacity="0.3"/>

</svg>